<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="天天向上">
<meta name="mobile-web-app-capable" content="yes">
<meta name="format-detection" content="telephone=no">
<link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%231e90ff'/><text x='50' y='68' font-size='60' text-anchor='middle'>🚀</text></svg>">
<link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>🚀</text></svg>">
<title>天天向上！</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { -webkit-text-size-adjust: 100%; touch-action: manipulation; overscroll-behavior: none; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Comic Sans MS", sans-serif;
    background: linear-gradient(135deg, #a8edea 0%, #fed6e3 50%, #ffecd2 100%);
    min-height: 100vh;
    padding: max(16px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(16px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
    color: #2d3436;
    -webkit-user-select: none;
    user-select: none;
  }
  input { -webkit-user-select: auto; user-select: auto; }
  .container { max-width: 1100px; margin: 0 auto; }

  /* Header */
  header {
    background: #fff;
    border-radius: 24px;
    padding: 20px 24px;
    box-shadow: 0 8px 24px rgba(255, 154, 158, 0.25);
    margin-bottom: 16px;
  }
  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 12px;
  }
  header h1 {
    font-size: 34px;
    font-weight: 900;
    color: #1e90ff;
    -webkit-text-stroke: 1px #0c6fd1;
    letter-spacing: 3px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    filter: drop-shadow(0 3px 6px rgba(30, 144, 255, 0.35));
    text-shadow: 0 2px 0 #b3d9ff, 0 4px 0 rgba(30, 144, 255, 0.25);
  }
  header h1 .title-emoji {
    font-size: 36px;
    display: inline-block;
    text-shadow: none;
    -webkit-text-stroke: 0;
  }
  header h1 .rocket-1 { animation: rocketJump 1.4s ease-in-out infinite; }
  header h1 .rocket-2 { animation: rocketJump 1.4s ease-in-out infinite; animation-delay: 0.2s; }
  header h1 .rocket-3 { animation: rocketJump 1.4s ease-in-out infinite; animation-delay: 0.4s; }
  header h1 .flame {
    animation: flameFlicker 0.6s ease-in-out infinite;
    transform-origin: center bottom;
    display: inline-block;
    text-shadow: none;
    -webkit-text-stroke: 0;
  }
  header h1 .title-bang {
    color: #1e90ff;
    -webkit-text-stroke: 1px #0c6fd1;
    animation: wobble 1.6s ease-in-out infinite;
    display: inline-block;
  }
  @keyframes rocketJump {
    0%,100% { transform: translateY(0) rotate(-8deg); }
    50% { transform: translateY(-10px) rotate(8deg); }
  }
  @keyframes flameFlicker {
    0%,100% { transform: scale(1) rotate(-3deg); opacity: 0.9; }
    50% { transform: scale(1.25) rotate(3deg); opacity: 1; }
  }
  @keyframes wobble {
    0%,100% { transform: rotate(-6deg) scale(1); }
    50% { transform: rotate(6deg) scale(1.15); }
  }
  .today-info {
    background: linear-gradient(135deg, #ffeaa7, #fab1a0);
    border-radius: 14px;
    padding: 10px 18px;
    font-weight: 700;
    color: #6c5ce7;
    font-size: 16px;
  }
  .week-info { color: #95a5a6; font-size: 13px; margin-top: 6px; }
  .kid-bar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .kid-tab {
    padding: 12px 22px;
    border-radius: 50px;
    background: #ecf0f1;
    cursor: pointer;
    border: 3px solid transparent;
    font-size: 16px;
    font-weight: 600;
    transition: all 0.2s;
    min-height: 48px;
  }
  .kid-tab.active {
    background: linear-gradient(135deg, #fd79a8, #fdcb6e);
    color: #fff;
    transform: scale(1.05);
    box-shadow: 0 4px 12px rgba(253, 121, 168, 0.4);
  }

  /* Buttons */
  .btn {
    padding: 14px 22px;
    border: none;
    border-radius: 16px;
    cursor: pointer;
    font-size: 16px;
    background: #00b894;
    color: #fff;
    transition: all 0.15s;
    min-height: 48px;
    font-weight: 700;
  }
  .btn:active { transform: scale(0.95); }
  .btn-warn { background: linear-gradient(135deg, #fdcb6e, #e17055); color: #fff; }
  .btn-danger { background: linear-gradient(135deg, #ff7675, #d63031); }
  .btn-secondary { background: linear-gradient(135deg, #74b9ff, #0984e3); }
  .btn-primary { background: linear-gradient(135deg, #a29bfe, #6c5ce7); }
  .btn-success { background: linear-gradient(135deg, #55efc4, #00b894); }
  .btn-small { padding: 10px 16px; font-size: 14px; min-height: 40px; }
  .btn-huge { padding: 24px 40px; font-size: 24px; min-height: 70px; border-radius: 20px; }

  /* Dashboard */
  .dashboard {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 14px;
    margin-bottom: 16px;
  }
  .stat-card {
    background: #fff;
    border-radius: 20px;
    padding: 20px 16px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .stat-card .emoji {
    font-size: 28px;
    margin-bottom: 6px;
    display: block;
  }
  .stat-card .label { color: #636e67; font-size: 13px; margin-bottom: 6px; font-weight: 600; }
  .stat-card .value { font-size: 36px; font-weight: 800; color: #2d3436; }
  .stat-card .unit { font-size: 14px; color: #95a5a6; margin-left: 4px; font-weight: 500; }
  .stat-card.score { background: linear-gradient(135deg, #a29bfe, #6c5ce7); color: #fff; }
  .stat-card.score .label, .stat-card.score .value, .stat-card.score .unit { color: #fff; }
  .stat-card.reward { background: linear-gradient(135deg, #55efc4, #00b894); color: #fff; }
  .stat-card.reward .label, .stat-card.reward .value, .stat-card.reward .unit { color: #fff; }
  .stat-card.today { background: linear-gradient(135deg, #ffeaa7, #fdcb6e); }

  /* Quick actions */
  .quick-actions {
    background: #fff;
    border-radius: 20px;
    padding: 16px;
    margin-bottom: 16px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.06);
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
  }
  .quick-actions .label { color: #636e67; font-weight: 600; font-size: 14px; margin-right: 4px; }

  /* Subjects */
  .subjects {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 16px;
    margin-bottom: 16px;
  }
  .subject-card {
    background: #fff;
    border-radius: 24px;
    padding: 22px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    border: 4px solid transparent;
    transition: all 0.2s;
  }
  .subject-card.chinese { border-color: #ff7675; }
  .subject-card.math { border-color: #74b9ff; }
  .subject-card.english { border-color: #55efc4; }
  .subject-card h2 {
    font-size: 22px;
    margin-bottom: 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: 800;
  }
  .subject-card .icon { font-size: 32px; }
  .estimated-row {
    display: flex;
    align-items: center;
    gap: 10px;
    justify-content: center;
    margin-bottom: 10px;
    font-size: 15px;
    color: #636e67;
    font-weight: 600;
  }
  .estimated-input {
    width: 90px;
    padding: 10px;
    border: 3px solid #dfe6e9;
    border-radius: 12px;
    text-align: center;
    font-size: 18px;
    font-weight: 700;
    min-height: 44px;
  }
  .estimated-input:focus { outline: none; border-color: #6c5ce7; }
  .timer-display {
    font-size: 48px;
    font-weight: 900;
    text-align: center;
    margin: 14px 0;
    color: #b2bec3;
    font-variant-numeric: tabular-nums;
    letter-spacing: 2px;
  }
  .timer-display.running { color: #00b894; animation: pulse 1.5s infinite; }
  .timer-display.over { color: #d63031; animation: shake 0.6s infinite; }
  @keyframes pulse { 0%,100%{opacity:1; transform: scale(1);} 50%{opacity:0.7; transform: scale(1.02);} }
  @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-4px);} 75%{transform:translateX(4px);} }
  .timer-controls { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-top: 12px; }
  .today-summary {
    margin-top: 12px;
    padding: 12px;
    border-radius: 14px;
    background: #f1f2f6;
    text-align: center;
    font-size: 14px;
    font-weight: 600;
  }
  .today-summary.has-good { background: linear-gradient(135deg, #d1f7e3, #aef1c8); color: #00734a; }
  .today-summary.has-bad { background: linear-gradient(135deg, #fde0e1, #f9b8b9); color: #971c1f; }
  .today-summary .sessions {
    margin-top: 6px;
    font-size: 12px;
    font-weight: 500;
    opacity: 0.85;
  }

  /* History */
  .history-section {
    background: #fff;
    border-radius: 24px;
    padding: 22px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    margin-bottom: 16px;
  }
  .history-section h2 { margin-bottom: 16px; font-size: 20px; font-weight: 800; }
  .day-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px;
    border-radius: 16px;
    background: #f8f9fa;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .day-row.today { background: linear-gradient(135deg, #ffeaa7, #fab1a0); }
  .day-label {
    font-weight: 800;
    font-size: 16px;
    min-width: 90px;
  }
  .day-score {
    font-weight: 800;
    font-size: 18px;
    padding: 6px 14px;
    border-radius: 20px;
    background: #fff;
    color: #6c5ce7;
  }
  .day-score.negative { color: #d63031; }
  .day-score.zero { color: #95a5a6; }
  .day-details {
    flex: 1;
    font-size: 13px;
    color: #636e67;
    min-width: 200px;
  }
  .day-details .item { display: inline-block; margin-right: 10px; }
  .empty-state { color: #b2bec3; text-align: center; padding: 30px; font-size: 14px; }

  /* Modals */
  .modal-overlay {
    position: fixed; top:0; left:0; right:0; bottom:0;
    background: rgba(0,0,0,0.5);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 100;
    padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: #fff;
    border-radius: 24px;
    padding: 28px;
    max-width: 460px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
  }
  .modal h2 { margin-bottom: 16px; font-size: 22px; font-weight: 800; }
  .modal label { display: block; margin: 14px 0 6px; font-size: 14px; color: #636e67; font-weight: 600; }
  .modal input, .modal textarea, .modal select {
    width: 100%; padding: 12px;
    border: 3px solid #dfe6e9;
    border-radius: 12px;
    font-size: 16px;
    min-height: 44px;
    font-family: inherit;
  }
  .modal textarea { min-height: 80px; resize: vertical; }
  .modal .actions { display: flex; gap: 8px; margin-top: 20px; justify-content: flex-end; flex-wrap: wrap; }
  .radio-group { display: flex; gap: 8px; margin-top: 6px; }
  .radio-btn {
    flex: 1;
    padding: 12px;
    border: 3px solid #dfe6e9;
    border-radius: 12px;
    text-align: center;
    cursor: pointer;
    font-weight: 700;
    background: #fff;
  }
  .radio-btn.selected.plus { border-color: #00b894; background: #d1f7e3; color: #00734a; }
  .radio-btn.selected.minus { border-color: #d63031; background: #fde0e1; color: #971c1f; }
  .week-summary-list { max-height: 300px; overflow-y: auto; }
  .week-summary-list .item {
    padding: 12px;
    background: #f1f2f6;
    border-radius: 12px;
    margin-bottom: 8px;
    font-size: 13px;
  }
  .week-summary-list .item strong { color: #6c5ce7; }

  /* Fullscreen Timer */
  .fullscreen-timer {
    position: fixed;
    inset: 0;
    z-index: 200;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px;
    text-align: center;
  }
  .fullscreen-timer.show { display: flex; }
  .fullscreen-timer.chinese { background: linear-gradient(135deg, #ff7675, #d63031); }
  .fullscreen-timer.math { background: linear-gradient(135deg, #74b9ff, #0984e3); }
  .fullscreen-timer.english { background: linear-gradient(135deg, #55efc4, #00b894); }
  .fs-subject-name {
    font-size: 48px;
    font-weight: 900;
    color: #fff;
    margin-bottom: 14px;
    text-shadow: 0 4px 14px rgba(0,0,0,0.2);
  }
  .fs-subject-icon { font-size: 96px; margin-bottom: 10px; }
  .fs-estimated { color: rgba(255,255,255,0.92); font-size: 22px; margin-bottom: 24px; font-weight: 600; }
  .fs-timer {
    font-size: 22vw;
    font-weight: 900;
    color: #fff;
    font-variant-numeric: tabular-nums;
    line-height: 1;
    text-shadow: 0 8px 24px rgba(0,0,0,0.25);
    margin: 10px 0 20px;
    letter-spacing: -4px;
  }
  .fs-timer.over { animation: shake 0.6s infinite; }
  .fs-status {
    color: #fff;
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 30px;
    padding: 12px 28px;
    background: rgba(255,255,255,0.2);
    border-radius: 50px;
    backdrop-filter: blur(8px);
  }
  .fs-status.over { background: rgba(0,0,0,0.3); }
  .fs-controls { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; }
  .fs-btn {
    padding: 22px 44px;
    border: none;
    border-radius: 24px;
    font-size: 22px;
    font-weight: 800;
    cursor: pointer;
    min-height: 80px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
  }
  .fs-btn.complete { background: #fff; color: #00734a; }
  .fs-btn.cancel { background: rgba(0,0,0,0.3); color: #fff; }
  .fs-btn:active { transform: scale(0.95); }
  @media (max-width: 600px) {
    .fs-timer { font-size: 28vw; }
    .fs-subject-name { font-size: 36px; }
    .fs-subject-icon { font-size: 72px; }
    .fs-status { font-size: 18px; }
    .fs-btn { padding: 18px 32px; font-size: 18px; }
  }

  /* Celebration */
  .celebrate-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 300;
    display: none;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }
  .celebrate-overlay.show { display: flex; }
  .celebrate-box {
    background: #fff;
    border-radius: 32px;
    padding: 40px 30px;
    text-align: center;
    max-width: 400px;
    width: 100%;
    animation: bounceIn 0.5s;
  }
  @keyframes bounceIn {
    0% { transform: scale(0.3); opacity: 0; }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); opacity: 1; }
  }
  .celebrate-box .big-emoji { font-size: 80px; margin-bottom: 10px; }
  .celebrate-box .title { font-size: 28px; font-weight: 900; margin-bottom: 10px; }
  .celebrate-box.good .title { color: #00b894; }
  .celebrate-box.bad .title { color: #e17055; }
  .celebrate-box .detail { font-size: 16px; color: #636e67; margin-bottom: 20px; line-height: 1.6; }
  .celebrate-box .score-badge {
    font-size: 56px;
    font-weight: 900;
    margin: 14px 0;
  }
  .celebrate-box.good .score-badge { color: #00b894; }
  .celebrate-box.bad .score-badge { color: #d63031; }

  @media (max-width: 600px) {
    body { padding: 10px; }
    header { padding: 16px; border-radius: 18px; }
    header h1 { font-size: 26px; letter-spacing: 1px; }
    header h1 .title-emoji { font-size: 28px; }
    .timer-display { font-size: 36px; }
    .stat-card .value { font-size: 28px; }
    .subjects { grid-template-columns: 1fr; }
    .modal { padding: 22px; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="header-top">
      <div>
        <h1>
          <span class="title-emoji rocket-1">🚀</span>
          天天向上
          <span class="title-bang">！</span>
          <span class="title-emoji rocket-2">🚀</span>
          <span class="title-emoji flame">🔥</span>
          <span class="title-emoji rocket-3">🚀</span>
        </h1>
        <div class="week-info" id="weekInfo"></div>
      </div>
      <div class="today-info" id="todayInfo">加载中...</div>
    </div>
    <div class="kid-bar" id="kidBar"></div>
  </header>

  <div class="dashboard">
    <div class="stat-card score">
      <span class="emoji">⭐</span>
      <div class="label">本周总积分</div>
      <div><span class="value" id="weekScore">0</span><span class="unit">分</span></div>
    </div>
    <div class="stat-card today">
      <span class="emoji">📅</span>
      <div class="label">今日积分</div>
      <div><span class="value" id="todayScore">0</span><span class="unit">分</span></div>
    </div>
    <div class="stat-card reward">
      <span class="emoji">🎁</span>
      <div class="label">可兑换电视/游戏</div>
      <div><span class="value" id="rewardTime">0</span><span class="unit">分钟</span></div>
    </div>
    <div class="stat-card">
      <span class="emoji">✅</span>
      <div class="label">今日完成</div>
      <div><span class="value" id="todayDone">0</span><span class="unit">门</span></div>
    </div>
  </div>

  <div class="quick-actions">
    <span class="label">快捷操作：</span>
    <button class="btn btn-primary btn-small" onclick="openBonusModal()">✨ 额外加分/扣分</button>
    <button class="btn btn-secondary btn-small" onclick="showWeekHistory()">📜 历史周</button>
    <button class="btn btn-warn btn-small" onclick="endWeekManually()">🏁 结束本周</button>
  </div>

  <div class="subjects" id="subjectsGrid"></div>

  <div class="history-section">
    <h2>📊 本周每日记录</h2>
    <div id="weekDailyTable"></div>
  </div>
</div>

<!-- 全屏计时 -->
<div class="fullscreen-timer" id="fullscreenTimer">
  <div class="fs-subject-icon" id="fsIcon">📖</div>
  <div class="fs-subject-name" id="fsName">语文</div>
  <div class="fs-estimated" id="fsEstimated">预计 30 分钟</div>
  <div class="fs-timer" id="fsTimer">00:00</div>
  <div class="fs-status" id="fsStatus">⏱ 加油哦！</div>
  <div class="fs-controls">
    <button class="fs-btn complete" onclick="finishCurrentTimer()">✅ 完成了</button>
    <button class="fs-btn cancel" onclick="cancelCurrentTimer()">取消</button>
  </div>
</div>

<!-- 庆祝/反馈 -->
<div class="celebrate-overlay" id="celebrateOverlay" onclick="closeCelebrate()">
  <div class="celebrate-box" id="celebrateBox">
    <div class="big-emoji" id="celebrateEmoji">🎉</div>
    <div class="title" id="celebrateTitle">完成啦！</div>
    <div class="score-badge" id="celebrateScore">+5</div>
    <div class="detail" id="celebrateDetail"></div>
    <button class="btn btn-success" onclick="closeCelebrate()" style="width:100%">太棒了！</button>
  </div>
</div>

<!-- 完成确认 Modal -->
<div class="modal-overlay" id="finishModal">
  <div class="modal">
    <h2>📝 本次计时确认</h2>
    <div id="finishSummary" style="background:#f1f2f6;padding:14px;border-radius:12px;font-size:15px;line-height:1.7;"></div>
    <label>本次计时是否有效？</label>
    <p style="color:#95a5a6;font-size:13px;margin-top:4px;">如选"无效"，本次记录不计入积分（例如中途被打扰、误操作等）。</p>
    <div class="actions">
      <button class="btn btn-warn" onclick="confirmFinish(false)">无效，不计分</button>
      <button class="btn btn-success" onclick="confirmFinish(true)">有效，计入积分</button>
    </div>
  </div>
</div>

<!-- 添加小朋友 Modal -->
<div class="modal-overlay" id="addKidModal">
  <div class="modal">
    <h2>👶 添加小朋友</h2>
    <label>姓名</label>
    <input type="text" id="newKidName" placeholder="例如：小明" maxlength="10">
    <div class="actions">

</div>

<!-- 历史周 Modal -->
<div class="modal-overlay" id="historyModal">
  <div class="modal">
    <h2>📜 历史周积分</h2>
    <div class="week-summary-list" id="historyWeekList"></div>
    <div class="actions">
      <button class="btn btn-secondary" onclick="closeModal('historyModal')">关闭</button>
    </div>

<script>
const SUBJECTS = [
  { id: 'chinese', name: '语文', icon: '📖', cssClass: 'chinese' },
  { id: 'math', name: '数学', icon: '🔢', cssClass: 'math' },
  { id: 'english', name: '英语', icon: '🔤', cssClass: 'english' }
];
const DAY_NAMES = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
const DAY_EMOJI = ['🌞', '💪', '📚', '🎯', '🚀', '🎨', '🌈'];
const STORAGE_KEY = 'homework_tracker_v2';

let state = loadState();
let activeTimerSubject = null; // 当前全屏计时的科目 id
let tickerHandle = null;
let pendingFinish = null; // { subjectId, sessionData } 待确认完成

function loadState() {
  // 尝试迁移 v1
  const rawV2 = localStorage.getItem(STORAGE_KEY);
  if (rawV2) { try { return JSON.parse(rawV2); } catch(e) {} }
  return {
    kids: [ { id: genId(), name: '小朋友' } ],
    activeKidId: null,
    /* per kid:
      weeks[kidId] = {
        weekStart: ms (周一 00:00),
        days: { 'YYYY-MM-DD': { sessions: [ {subjectId, estimatedMin, actualMin, score, timestamp, valid:true} ], bonuses: [ {amount, reason, timestamp} ] } },
        defaultEstimated: { chinese: 30, math: 30, english: 30 },
        history: [ {weekStart, weekEnd, totalScore, days, bonuses?, reason} ]
      }
    */
    weeks: {}
  };
}

function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function genId() { return 'id_' + Math.random().toString(36).slice(2,9); }

// 日期工具
function getMondayOfWeek(date) {
  const d = new Date(date);
  d.setHours(0,0,0,0);
  const day = d.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  d.setDate(d.getDate() + diff);
  return d;
}
function dateKey(d) {
  const date = new Date(d);
  return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
}
function formatDate(d) { return dateKey(d); }
function formatDateTime(d) {
  const date = new Date(d);
  return `${formatDate(date)} ${String(date.getHours()).padStart(2,'0')}:${String(date.getMinutes()).padStart(2,'0')}`;
}
function todayKey() { return dateKey(new Date()); }
function todayDayOfWeek() { return new Date().getDay(); }

function ensureWeek(kidId) {
  if (!state.weeks[kidId]) {
    state.weeks[kidId] = {
      weekStart: getMondayOfWeek(new Date()).getTime(),
      days: {},
      defaultEstimated: { chinese: 30, math: 30, english: 30 },
      history: []
    };
  }
  const w = state.weeks[kidId];
  if (!w.defaultEstimated) w.defaultEstimated = { chinese: 30, math: 30, english: 30 };
  if (!w.days) w.days = {};
  if (!w.history) w.history = [];
  // 结算周期 = 周一 ~ 周五，周六凌晨 00:00 自动归档
  const cutoff = w.weekStart + 5 * 86400000; // Sat 00:00
  if (Date.now() >= cutoff) {
    archiveCurrentWeek(kidId, '自动归档(周末结算)');
    // 推进到下一个周一
    const nextMonday = getMondayOfWeek(new Date()).getTime();
    w.weekStart = nextMonday > w.weekStart ? nextMonday : w.weekStart + 7 * 86400000;
    w.days = {};
  }
  // 确保今天有占位
  const tk = todayKey();
  if (!w.days[tk]) w.days[tk] = { sessions: [], bonuses: [] };
  Object.values(w.days).forEach(d => {
    if (!d.sessions) d.sessions = [];
    if (!d.bonuses) d.bonuses = [];
  });
}

function archiveCurrentWeek(kidId, reason) {
  const w = state.weeks[kidId];
  if (!w) return;
  const totalScore = calcWeekTotal(w);
  const breakdown = calcWeekBreakdown(w);
  const hasAny = Object.values(w.days || {}).some(d =>
    (d.sessions || []).some(s => s.valid) || (d.bonuses || []).length > 0
  );
  if (!hasAny) return;
  w.history.unshift({
    weekStart: w.weekStart,
    weekEnd: Date.now(),
    totalScore,
    breakdown,
    days: JSON.parse(JSON.stringify(w.days)),
    reason: reason || ''
  });
  if (w.history.length > 20) w.history = w.history.slice(0,20);
}

// 积分计算
function calcSessionScore(estimatedMin, actualMin) {
  const diff = estimatedMin - actualMin; // 正 = 提前
  if (diff > 0) return diff;
  if (diff < 0) return diff;
  return 1; // 按时完成 +1
}
function calcDayTotal(day) {
  if (!day) return 0;
  const sessionSum = (day.sessions || []).filter(s => s.valid).reduce((sum,s) => sum + (s.score || 0), 0);
  const bonusSum = (day.bonuses || []).reduce((sum,b) => sum + (b.amount || 0), 0);
  return sessionSum + bonusSum;
}
function calcWeekTotal(w) {
  if (!w || !w.days) return 0;
  return Object.values(w.days).reduce((sum, d) => sum + calcDayTotal(d), 0);
}

// 按学科+额外的拆分统计，兼容当前周对象和历史归档对象
function calcWeekBreakdown(weekLike) {
  const result = { chinese: 0, math: 0, english: 0, bonus: 0, total: 0, sessionsCount: { chinese:0, math:0, english:0 } };
  const days = (weekLike && weekLike.days) || {};
  Object.values(days).forEach(d => {
    (d.sessions || []).filter(s => s.valid).forEach(s => {
      if (result[s.subjectId] !== undefined) {
        result[s.subjectId] += (s.score || 0);
        result.sessionsCount[s.subjectId]++;
      }
    });
    (d.bonuses || []).forEach(b => { result.bonus += (b.amount || 0); });
  });
  result.total = result.chinese + result.math + result.english + result.bonus;
  return result;
}

// === 渲染 ===
function render() {
  if (!state.activeKidId || !state.kids.find(k => k.id === state.activeKidId)) {
    state.activeKidId = state.kids[0]?.id || null;
  }
  if (state.activeKidId) ensureWeek(state.activeKidId);
  saveState();
  renderKidBar();
  renderHeaderInfo();
  renderDashboard();
  renderSubjects();
  renderWeekDailyTable();
}

function renderKidBar() {
  const bar = document.getElementById('kidBar');
  bar.innerHTML = '';
  state.kids.forEach(kid => {
    const btn = document.createElement('button');
    btn.className = 'kid-tab' + (kid.id === state.activeKidId ? ' active' : '');
    btn.textContent = kid.name;
    btn.onclick = () => { state.activeKidId = kid.id; render(); };
    bar.appendChild(btn);

    if (kid.id === state.activeKidId && state.kids.length > 1) {
      const delBtn = document.createElement('button');
      delBtn.className = 'btn btn-danger btn-small';
      delBtn.textContent = '删除';
      delBtn.onclick = (e) => {
        e.stopPropagation();
        if (confirm(`确定删除 ${kid.name} 的所有数据？`)) {
          state.kids = state.kids.filter(k => k.id !== kid.id);
          delete state.weeks[kid.id];
          state.activeKidId = state.kids[0]?.id || null;
          render();
        }
      };
      bar.appendChild(delBtn);
    }
  });
  const addBtn = document.createElement('button');
  addBtn.className = 'btn btn-primary btn-small';
  addBtn.textContent = '+ 添加小朋友';
  addBtn.onclick = () => { document.getElementById('newKidName').value = ''; openModal('addKidModal'); };
  bar.appendChild(addBtn);
}

function renderHeaderInfo() {
  const now = new Date();
  const dow = now.getDay();
  document.getElementById('todayInfo').textContent = `${DAY_EMOJI[dow]} 今天是 ${DAY_NAMES[dow]} · ${dateKey(now)}`;
  if (!state.activeKidId) { document.getElementById('weekInfo').textContent = '请先添加小朋友'; return; }
  const w = state.weeks[state.activeKidId];
  const start = new Date(w.weekStart);
  const end = new Date(w.weekStart + 4 * 86400000); // Mon ~ Fri
  document.getElementById('weekInfo').textContent = `结算周期：${formatDate(start)} 周一 ～ ${formatDate(end)} 周五（周六凌晨自动结算）`;
}

function renderDashboard() {
  if (!state.activeKidId) {
    document.getElementById('weekScore').textContent = '0';
    document.getElementById('todayScore').textContent = '0';
    document.getElementById('rewardTime').textContent = '0';
    document.getElementById('todayDone').textContent = '0';
    return;
  }
  const w = state.weeks[state.activeKidId];
  const weekTotal = calcWeekTotal(w);
  const today = w.days[todayKey()] || { sessions: [], bonuses: [] };
  const todayTotal = calcDayTotal(today);
  const todayDoneSubjects = new Set(
    (today.sessions || []).filter(s => s.valid).map(s => s.subjectId)
  );
  document.getElementById('weekScore').textContent = weekTotal;
  document.getElementById('todayScore').textContent = todayTotal;
  document.getElementById('rewardTime').textContent = Math.max(0, weekTotal);
  document.getElementById('todayDone').textContent = todayDoneSubjects.size;
}

function renderSubjects() {
  const grid = document.getElementById('subjectsGrid');
  grid.innerHTML = '';
  if (!state.activeKidId) {
    grid.innerHTML = '<div class="empty-state">请先添加小朋友</div>';
    return;
  }
  const w = state.weeks[state.activeKidId];
  const today = w.days[todayKey()];
  SUBJECTS.forEach(subject => {
    const todaySessions = (today.sessions || []).filter(s => s.subjectId === subject.id && s.valid);
    const todayScore = todaySessions.reduce((sum, s) => sum + (s.score || 0), 0);
    const defaultEst = w.defaultEstimated[subject.id] || 30;

    let summaryHTML = '';
    if (todaySessions.length > 0) {
      const cls = todayScore > 0 ? 'has-good' : todayScore < 0 ? 'has-bad' : '';
      const sign = todayScore > 0 ? '+' : '';
      summaryHTML = `<div class="today-summary ${cls}">
        今日已完成 ${todaySessions.length} 次 · 累计 <strong>${sign}${todayScore}</strong> 分
        <div class="sessions">${todaySessions.map(s => {
          const sgn = s.score > 0 ? '+' : '';
          return `<span>第${todaySessions.indexOf(s)+1}次 ${s.actualMin}分(${sgn}${s.score})</span>`;
        }).join(' · ')}</div>
      </div>`;
    } else {
      summaryHTML = `<div class="today-summary">今日还没开始 ${subject.name} 📋</div>`;
    }

    const card = document.createElement('div');
    card.className = 'subject-card ' + subject.cssClass;
    card.innerHTML = `
      <h2><span>${subject.icon} ${subject.name}</span></h2>
      <div class="estimated-row">
        <span>预计</span>
        <input type="number" min="1" max="240" class="estimated-input" id="est-${subject.id}"
          value="${defaultEst}" inputmode="numeric"
          onchange="updateDefaultEstimated('${subject.id}', this.value)">
        <span>分钟</span>
      </div>
      <div class="timer-display" style="font-size:36px;color:#dfe6e9;">⏱</div>
      <div class="timer-controls">
        <button class="btn btn-huge" style="width:100%" onclick="startSubject('${subject.id}')">▶ 开始 ${subject.name}</button>
      </div>
      ${summaryHTML}
    `;
    grid.appendChild(card);
  });
}

function renderWeekDailyTable() {
  const container = document.getElementById('weekDailyTable');
  if (!state.activeKidId) { container.innerHTML = '<div class="empty-state">请先添加小朋友</div>'; return; }
  const w = state.weeks[state.activeKidId];
  const tk = todayKey();
  const rows = [];
  for (let i = 0; i < 5; i++) { // Mon ~ Fri
    const d = new Date(w.weekStart + i * 86400000);
    const key = dateKey(d);
    const day = w.days[key];
    const dayTotal = calcDayTotal(day);
    const sign = dayTotal > 0 ? '+' : '';
    const scoreCls = dayTotal > 0 ? '' : dayTotal < 0 ? 'negative' : 'zero';
    const todayCls = key === tk ? 'today' : '';
    const isFuture = d.getTime() > new Date().setHours(23,59,59,999);

    let detailsHTML = '';
    if (day) {
      const parts = [];
      SUBJECTS.forEach(s => {
        const ss = (day.sessions || []).filter(x => x.subjectId === s.id && x.valid);
        if (ss.length > 0) {
          const total = ss.reduce((sum, x) => sum + x.score, 0);
          const sgn = total > 0 ? '+' : '';
          parts.push(`<span class="item">${s.icon}${ss.length}次 ${sgn}${total}</span>`);
        }
      });
      (day.bonuses || []).forEach(b => {
        const sgn = b.amount > 0 ? '+' : '';
        parts.push(`<span class="item">✨${sgn}${b.amount}${b.reason ? '('+b.reason+')' : ''}</span>`);
      });
      detailsHTML = parts.join('') || (isFuture ? '<span style="color:#b2bec3;">未到</span>' : '<span style="color:#b2bec3;">无记录</span>');
    } else {
      detailsHTML = isFuture ? '<span style="color:#b2bec3;">未到</span>' : '<span style="color:#b2bec3;">无记录</span>';
    }

    rows.push(`<div class="day-row ${todayCls}">
      <div class="day-label">${DAY_EMOJI[d.getDay()]} ${DAY_NAMES[d.getDay()]}<br><span style="font-size:11px;font-weight:500;color:#95a5a6;">${key.slice(5)}</span></div>
      <div class="day-score ${scoreCls}">${sign}${dayTotal} 分</div>
      <div class="day-details">${detailsHTML}</div>
    </div>`);
  }
  container.innerHTML = rows.join('');
}

// === 操作 ===
function updateDefaultEstimated(subjectId, value) {
  const w = state.weeks[state.activeKidId];
  w.defaultEstimated[subjectId] = parseInt(value) || 30;
  saveState();
}

function startSubject(subjectId) {
  if (activeTimerSubject) return; // 已在计时
  const w = state.weeks[state.activeKidId];
  const estInput = document.getElementById('est-' + subjectId);
  const estimatedMin = parseInt(estInput.value) || 30;
  if (estimatedMin < 1) { alert('预计时间至少为 1 分钟'); return; }
  w.defaultEstimated[subjectId] = estimatedMin;
  saveState();

  activeTimerSubject = {
    subjectId,
    estimatedMin,
    startedAt: Date.now()
  };
  showFullscreenTimer();
}

function showFullscreenTimer() {
  const t = activeTimerSubject;
  const subject = SUBJECTS.find(s => s.id === t.subjectId);
  const fs = document.getElementById('fullscreenTimer');
  fs.className = 'fullscreen-timer show ' + subject.cssClass;
  document.getElementById('fsIcon').textContent = subject.icon;
  document.getElementById('fsName').textContent = subject.name;
  document.getElementById('fsEstimated').textContent = `预计 ${t.estimatedMin} 分钟`;
  updateFsTimer();
  if (tickerHandle) clearInterval(tickerHandle);
  tickerHandle = setInterval(updateFsTimer, 1000);
}

function updateFsTimer() {
  if (!activeTimerSubject) return;
  const elapsedSec = Math.floor((Date.now() - activeTimerSubject.startedAt) / 1000);
  const estimatedSec = activeTimerSubject.estimatedMin * 60;
  const el = document.getElementById('fsTimer');
  el.textContent = formatElapsed(elapsedSec);
  const statusEl = document.getElementById('fsStatus');
  if (elapsedSec > estimatedSec) {
    el.classList.add('over');
    statusEl.classList.add('over');
    const over = elapsedSec - estimatedSec;
    statusEl.textContent = `⚠️ 已超时 ${formatElapsed(over)}`;
  } else {
    el.classList.remove('over');
    statusEl.classList.remove('over');
    const left = estimatedSec - elapsedSec;
    statusEl.textContent = `⏱ 还剩 ${formatElapsed(left)} · 加油！`;
  }
}

function formatElapsed(sec) {
  sec = Math.max(0, sec);
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;
  if (h > 0) return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function finishCurrentTimer() {
  if (!activeTimerSubject) return;
  if (tickerHandle) { clearInterval(tickerHandle); tickerHandle = null; }
  const t = activeTimerSubject;
  const subject = SUBJECTS.find(s => s.id === t.subjectId);
  const elapsedSec = (Date.now() - t.startedAt) / 1000;
  const actualMin = Math.round(elapsedSec / 60);
  const score = calcSessionScore(t.estimatedMin, actualMin);
  const diff = t.estimatedMin - actualMin;
  const diffText = diff > 0 ? `提前 ${diff} 分钟` : diff < 0 ? `超时 ${-diff} 分钟` : '按时完成';
  const sign = score > 0 ? '+' : '';

  pendingFinish = {
    subjectId: t.subjectId,
    estimatedMin: t.estimatedMin,
    actualMin,
    actualSec: Math.round(elapsedSec),
    score,
    timestamp: Date.now()
  };
  document.getElementById('finishSummary').innerHTML = `
    <div style="font-size:18px;font-weight:800;margin-bottom:8px;">${subject.icon} ${subject.name}</div>
    预计：<strong>${t.estimatedMin}</strong> 分钟<br>
    实际：<strong>${actualMin}</strong> 分钟（${formatElapsed(Math.round(elapsedSec))}）<br>
    结果：<strong>${diffText}</strong><br>
    将获得积分：<strong style="color:${score>=0?'#00b894':'#d63031'};font-size:20px;">${sign}${score}</strong>
  `;
  document.getElementById('fullscreenTimer').classList.remove('show');
  openModal('finishModal');
}

function cancelCurrentTimer() {
  if (!confirm('确定取消本次计时？将不计入任何积分。')) return;
  if (tickerHandle) { clearInterval(tickerHandle); tickerHandle = null; }
  activeTimerSubject = null;
  document.getElementById('fullscreenTimer').classList.remove('show');
}

function confirmFinish(valid) {
  if (!pendingFinish) return;
  const w = state.weeks[state.activeKidId];
  const tk = todayKey();
  if (!w.days[tk]) w.days[tk] = { sessions: [], bonuses: [] };
  w.days[tk].sessions.push({
    ...pendingFinish,
    valid: !!valid
  });
  saveState();
  const subject = SUBJECTS.find(s => s.id === pendingFinish.subjectId);
  const finalScore = valid ? pendingFinish.score : 0;
  const wasOverTime = pendingFinish.actualMin > pendingFinish.estimatedMin;

  closeModal('finishModal');
  activeTimerSubject = null;
  pendingFinish = null;
  render();

  if (!valid) {
    showCelebrate({
      good: true,
      emoji: '👌',
      title: '已记录（未计分）',
      score: '0',
      detail: `${subject.icon} ${subject.name} 本次计时未计入积分。`
    });
  } else if (finalScore > 0) {
    showCelebrate({
      good: true,
      emoji: '🎉',
      title: '太厉害啦！',
      score: '+' + finalScore,
      detail: `${subject.icon} ${subject.name} 完成！比预计提前了 ${pendingFinish.estimatedMin - pendingFinish.actualMin} 分钟，奖励 ${finalScore} 积分！`
    });
  } else if (finalScore < 0) {
    showCelebrate({
      good: false,
      emoji: '😔',
      title: '差一点点',
      score: finalScore,
      detail: `${subject.icon} ${subject.name} 完成，但是超时了 ${pendingFinish.actualMin - pendingFinish.estimatedMin} 分钟，扣除 ${-finalScore} 分。下次更专心些哦！`
    });
  } else {
    showCelebrate({
      good: true,
      emoji: '👍',
      title: '按时完成！',
      score: '+1',
      detail: `${subject.icon} ${subject.name} 按时完成，奖励 1 分！`
    });
  }
}

function showCelebrate({ good, emoji, title, score, detail }) {
  const box = document.getElementById('celebrateBox');
  box.className = 'celebrate-box ' + (good ? 'good' : 'bad');
  document.getElementById('celebrateEmoji').textContent = emoji;
  document.getElementById('celebrateTitle').textContent = title;
  document.getElementById('celebrateScore').textContent = score;
  document.getElementById('celebrateDetail').textContent = detail;
  document.getElementById('celebrateOverlay').classList.add('show');
}
function closeCelebrate() { document.getElementById('celebrateOverlay').classList.remove('show'); }

// 额外积分
let bonusType = 'plus';
function openBonusModal() {
  bonusType = 'plus';
  setBonusType('plus');
  document.getElementById('bonusAmount').value = 1;
  document.getElementById('bonusReason').value = '';
  openModal('bonusModal');
}
function setBonusType(t) {
  bonusType = t;
  document.getElementById('bonusTypePlus').classList.toggle('selected', t === 'plus');
  document.getElementById('bonusTypeMinus').classList.toggle('selected', t === 'minus');
}
function addBonus() {
  const amt = parseInt(document.getElementById('bonusAmount').value);
  if (!amt || amt < 1) { alert('请输入有效的积分数量'); return; }
  const reason = document.getElementById('bonusReason').value.trim();
  const value = bonusType === 'plus' ? amt : -amt;
  const w = state.weeks[state.activeKidId];
  const tk = todayKey();
  if (!w.days[tk]) w.days[tk] = { sessions: [], bonuses: [] };
  w.days[tk].bonuses.push({
    amount: value,
    reason,
    timestamp: Date.now()
  });
  saveState();
  closeModal('bonusModal');
  render();
  const sign = value > 0 ? '+' : '';
  showCelebrate({
    good: value >= 0,
    emoji: value > 0 ? '✨' : '😶',
    title: value > 0 ? '获得额外积分！' : '积分扣减',
    score: sign + value,
    detail: reason ? `原因：${reason}` : '已记录到今日。'
  });
}

function endWeekManually() {
  const w = state.weeks[state.activeKidId];
  const hasAny = Object.values(w.days || {}).some(d =>
    (d.sessions || []).some(s => s.valid) || (d.bonuses || []).length > 0
  );
  if (!hasAny) { alert('本周还没有任何有效记录'); return; }
  showWeekSummaryModal('manual');
}

function showWeekSummaryModal(mode) {
  const w = state.weeks[state.activeKidId];
  const current = calcWeekBreakdown(w);
  const last = w.history && w.history[0] ? (w.history[0].breakdown || calcWeekBreakdown(w.history[0])) : null;
  const positive = Math.max(0, current.total);
  const kid = state.kids.find(k => k.id === state.activeKidId);
  const kidName = kid ? kid.name : '小朋友';

  const subjects = [
    { key: 'chinese', name: '语文', icon: '📖' },
    { key: 'math', name: '数学', icon: '🔢' },
    { key: 'english', name: '英语', icon: '🔤' },
    { key: 'bonus', name: '额外积分', icon: '✨' }
  ];

  // 鼓励语
  let cheerEmoji = '🏆', cheerTitle = '本周完美收官！', cheerText = '';
  if (last) {
    const diff = current.total - last.total;
    if (diff > 0) {
      cheerEmoji = '🚀'; cheerTitle = '进步啦！';
      cheerText = `比上周多了 ${diff} 分，${kidName}越来越棒了！继续保持哦～`;
    } else if (diff === 0) {
      cheerEmoji = '👍'; cheerTitle = '稳定发挥！';
      cheerText = `和上周一样 ${current.total} 分，下周一起来挑战新高吧！`;
    } else {
      cheerEmoji = '💪'; cheerTitle = '下周加油！';
      cheerText = `比上周少了 ${-diff} 分，没关系，下周${kidName}一定可以做得更好！`;
    }
  } else {
    if (current.total >= 30) cheerText = `第一周就拿到 ${current.total} 分，${kidName}很厉害！`;
    else if (current.total >= 0) cheerText = `这是${kidName}的第一周，加油哦！`;
    else cheerText = `第一周辛苦了，下周一起加油！`;
  }

  const rows = subjects.map(s => {
    const cur = current[s.key] || 0;
    const lst = last ? (last[s.key] || 0) : null;
    const sgn = cur > 0 ? '+' : '';
    const curColor = cur > 0 ? '#00b894' : cur < 0 ? '#d63031' : '#95a5a6';
    let trend = '';
    if (last !== null) {
      const d = cur - lst;
      if (d > 0) trend = `<span style="color:#00b894;font-weight:700;">▲ +${d}</span>`;
      else if (d < 0) trend = `<span style="color:#d63031;font-weight:700;">▼ ${d}</span>`;
      else trend = `<span style="color:#95a5a6;">— 持平</span>`;
    } else {
      trend = `<span style="color:#b2bec3;font-size:12px;">无上周数据</span>`;
    }
    return `<tr>
      <td style="padding:10px 8px;font-weight:700;">${s.icon} ${s.name}</td>
      <td style="padding:10px 8px;text-align:right;color:${curColor};font-weight:800;font-size:18px;">${sgn}${cur}</td>
      <td style="padding:10px 8px;text-align:right;color:#95a5a6;">${last !== null ? (lst > 0 ? '+'+lst : lst) : '-'}</td>
      <td style="padding:10px 8px;text-align:right;">${trend}</td>
    </tr>`;
  }).join('');

  const tableHTML = `
    <table style="width:100%;border-collapse:collapse;font-size:14px;">
      <thead>
        <tr style="background:#f1f2f6;">
          <th style="padding:10px 8px;text-align:left;color:#636e67;">项目</th>
          <th style="padding:10px 8px;text-align:right;color:#636e67;">本周</th>
          <th style="padding:10px 8px;text-align:right;color:#636e67;">上周</th>
          <th style="padding:10px 8px;text-align:right;color:#636e67;">环比</th>
        </tr>
      </thead>
      <tbody>${rows}
        <tr style="border-top:2px solid #dfe6e9;background:#fff8e1;">
          <td style="padding:12px 8px;font-weight:800;font-size:16px;">🏅 总计</td>
          <td style="padding:12px 8px;text-align:right;font-weight:900;font-size:20px;color:#6c5ce7;">${current.total > 0 ? '+' : ''}${current.total}</td>
          <td style="padding:12px 8px;text-align:right;color:#95a5a6;">${last !== null ? (last.total > 0 ? '+'+last.total : last.total) : '-'}</td>
          <td style="padding:12px 8px;text-align:right;">${last ? (() => {
            const d = current.total - last.total;
            if (d > 0) return `<span style="color:#00b894;font-weight:800;">▲ +${d}</span>`;
            if (d < 0) return `<span style="color:#d63031;font-weight:800;">▼ ${d}</span>`;
            return `<span style="color:#95a5a6;">持平</span>`;
          })() : '<span style="color:#b2bec3;">-</span>'}</td>
        </tr>
      </tbody>
    </table>
  `;

  document.getElementById('weekSummaryContent').innerHTML = `
    <div style="text-align:center;margin-bottom:18px;">
      <div style="font-size:64px;">${cheerEmoji}</div>
      <div style="font-size:24px;font-weight:900;margin-top:4px;color:#6c5ce7;">${cheerTitle}</div>
      <div style="color:#636e67;margin-top:6px;font-size:14px;line-height:1.5;">${cheerText}</div>
    </div>
    ${tableHTML}
    <div style="margin-top:16px;padding:14px;background:linear-gradient(135deg, #55efc4, #00b894);border-radius:14px;text-align:center;color:#fff;">
      <div style="font-size:13px;opacity:0.9;">本周可兑换</div>
      <div style="font-size:32px;font-weight:900;margin-top:2px;">🎁 ${positive} 分钟</div>
      <div style="font-size:12px;opacity:0.9;margin-top:2px;">电视 / 游戏 时间</div>
    </div>
  `;
  document.getElementById('weekSummaryMode').value = mode;
  openModal('weekSummaryModal');
}

function confirmEndWeek() {
  archiveCurrentWeek(state.activeKidId, '手动结束');
  const w = state.weeks[state.activeKidId];
  w.days = {};
  w.weekStart = getMondayOfWeek(new Date()).getTime();
  saveState();
  closeModal('weekSummaryModal');
  render();
}

function showWeekHistory() {
  const w = state.weeks[state.activeKidId];
  const list = document.getElementById('historyWeekList');
  if (!w || !w.history || w.history.length === 0) {
    list.innerHTML = '<div class="empty-state">还没有历史周记录</div>';
  } else {
    list.innerHTML = w.history.map(h => {
      const start = formatDate(h.weekStart);
      const end = formatDate(h.weekEnd);
      const positive = Math.max(0, h.totalScore);
      let dayDetails = '';
      if (h.days) {
        dayDetails = Object.entries(h.days).sort().map(([k, d]) => {
          const dt = calcDayTotal(d);
          if (dt === 0 && (!d.sessions || d.sessions.length === 0) && (!d.bonuses || d.bonuses.length === 0)) return '';
          const sgn = dt > 0 ? '+' : '';
          return `<div>${k.slice(5)}: ${sgn}${dt}分</div>`;
        }).filter(Boolean).join('');
      }
      return `<div class="item">
        <div><strong>${start} ～ ${end}</strong>（${h.reason || ''}）</div>
        <div style="margin-top:6px;">总积分：<strong>${h.totalScore}</strong> ｜ 可兑换 <strong>${positive}</strong> 分钟</div>
        <div style="margin-top:6px;color:#636e67;font-size:12px;">${dayDetails}</div>
      </div>`;
    }).join('');
  }
  openModal('historyModal');
}

function addKid() {
  const name = document.getElementById('newKidName').value.trim();
  if (!name) { alert('请输入姓名'); return; }
  state.kids.push({ id: genId(), name });
  state.activeKidId = state.kids[state.kids.length - 1].id;
  closeModal('addKidModal');
  render();
}

function openModal(id) { document.getElementById(id).classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }

// 每分钟自动检查跨日 / 跨周
setInterval(() => {
  if (!state.activeKidId) return;
  const beforeWeek = state.weeks[state.activeKidId].weekStart;
  const beforeHistoryLen = (state.weeks[state.activeKidId].history || []).length;
  ensureWeek(state.activeKidId);
  const after = state.weeks[state.activeKidId];
  if (after.weekStart !== beforeWeek) {
    saveState();
    render();
    if ((after.history || []).length > beforeHistoryLen) {
      alert('🌅 周末已自动结算上周积分，可在"历史周"查看～');
    } else {
      alert('🌅 新的一周开始啦！');
    }
  } else {
    render();
  }
}, 60000);

render();
</script>
</body>
</html>
